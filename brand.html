<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Autopulse Dashboard - Available Brand">
        <title>Autopulse - Available Brand</title>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header role="banner">
        <div>
            <button onclick="toggleSidebar()" aria-label="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" aria-label="Autopulse Dashboard">
                <i class="fas fa-car"></i> Autopulse
            </a>
            <nav aria-label="Breadcrumb">
                <a href="#">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Available Brand</span>
            </nav>
        </div>
        <div>
            <button aria-label="Notifications">
                <i class="fas fa-bell"></i>
            </button>
            <div aria-label="User Profile">
                <div>A</div>
                <div>
                    <div>Autopulse</div>
                    <div>Super Admin</div>
                </div>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- Dashboard Container -->
    <div>
        <!-- Sidebar -->
        <div id="sidebar-slot"></div>

        <!-- Main Content -->
        <main role="main">
            <div>
                <div>
                    <i class="fas fa-car"></i> Available Brand
                </div>
            </div>

            <h1>Available Brands</h1>

            <div>
                <!-- Brands Card -->
                <div>
                    <div>
                        <h2>Car Brands</h2>
                        <div>
                            <div>
                                <input type="text" id="searchInput" placeholder="Search by Brand Name or Country..." aria-label="Search Brands">
                                <i class="fas fa-search"></i>
                            </div>
                            <button onclick="showModal('addBrandModal')" aria-label="Add New Brand">
                                <i class="fas fa-plus"></i> Add Brand
                            </button>
                        </div>
                    </div>
                    <div>
                        <div>Total Brands: 15</div>
                        <div>
                            <table aria-label="Brands Table">
                                <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>Brand Name</th>
                                        <th>Country</th>
                                        <th>Supported Models</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="brandsTable">
                                    <tr>
                                        <td>1</td>
                                        <td>Toyota</td>
                                        <td>Japan</td>
                                        <td>Corolla, Camry, Yaris</td>
                                        <td>
                                            <button onclick="showEditModal(1, 'Toyota', 'Japan', 'Corolla, Camry, Yaris')" aria-label="Edit Brand"><i class="fas fa-edit"></i></button>
                                            <button onclick="deleteBrand(1)" aria-label="Delete Brand"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>2</td>
                                        <td>Honda</td>
                                        <td>Japan</td>
                                        <td>Civic, Accord, CR-V</td>
                                        <td>
                                            <button onclick="showEditModal(2, 'Honda', 'Japan', 'Civic, Accord, CR-V')" aria-label="Edit Brand"><i class="fas fa-edit"></i></button>
                                            <button onclick="deleteBrand(2)" aria-label="Delete Brand"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>3</td>
                                        <td>Chery</td>
                                        <td>China</td>
                                        <td>Tiggo, Arrizo</td>
                                        <td>
                                            <button onclick="showEditModal(3, 'Chery', 'China', 'Tiggo, Arrizo')" aria-label="Edit Brand"><i class="fas fa-edit"></i></button>
                                            <button onclick="deleteBrand(3)" aria-label="Delete Brand"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div role="navigation" aria-label="Pagination">
                            <button onclick="changePage('prev')" aria-label="Previous Page"><i class="fas fa-chevron-left"></i></button>
                            <button onclick="changePage(1)">1</button>
                            <button onclick="changePage(2)">2</button>
                            <button onclick="changePage(3)">3</button>
                            <button onclick="changePage(4)">4</button>
                            <span>...</span>
                            <button onclick="changePage(10)">10</button>
                            <button onclick="changePage('next')" aria-label="Next Page"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Brand Modal -->
    <div id="addBrandModal" role="dialog" aria-labelledby="addBrandTitle">
        <div>
            <div>
                <h2 id="addBrandTitle">Add Brand</h2>
                <button onclick="hideModal('addBrandModal')" aria-label="Close Modal">×</button>
            </div>
            <form id="addBrandForm" onsubmit="handleAddBrand(event)">
                <div>
                    <div>
                        <label for="addBrandName">Brand Name</label>
                        <input type="text" id="addBrandName" placeholder="Enter brand name" required>
                    </div>
                    <div>
                        <label for="addCountry">Country</label>
                        <input type="text" id="addCountry" placeholder="Enter country" required>
                    </div>
                    <div>
                        <label for="addModels">Supported Models</label>
                        <input type="text" id="addModels" placeholder="Enter supported models (e.g., Model1, Model2)">
                    </div>
                </div>
                <div>
                    <button type="button" onclick="hideModal('addBrandModal')" aria-label="Cancel">Cancel</button>
                    <button type="submit" aria-label="Save Brand">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Brand Modal -->
    <div id="editBrandModal" role="dialog" aria-labelledby="editBrandTitle">
        <div>
            <div>
                <h2 id="editBrandTitle">Edit Brand</h2>
                <button onclick="hideModal('editBrandModal')" aria-label="Close Modal">×</button>
            </div>
            <form id="editBrandForm" onsubmit="handleEditBrand(event)">
                <div>
                    <input type="hidden" id="editId">
                    <div>
                        <label for="editBrandName">Brand Name</label>
                        <input type="text" id="editBrandName" required>
                    </div>
                    <div>
                        <label for="editCountry">Country</label>
                        <input type="text" id="editCountry" required>
                    </div>
                    <div>
                        <label for="editModels">Supported Models</label>
                        <input type="text" id="editModels">
                    </div>
                </div>
                <div>
                    <button type="button" onclick="hideModal('editBrandModal')" aria-label="Cancel">Cancel</button>
                    <button type="submit" aria-label="Update Brand">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let brands = [
            { id: 1, brandName: 'Toyota', country: 'Japan', models: 'Corolla, Camry, Yaris' },
            { id: 2, brandName: 'Honda', country: 'Japan', models: 'Civic, Accord, CR-V' },
            { id: 3, brandName: 'Chery', country: 'China', models: 'Tiggo, Arrizo' }
        ];

        // Sidebar Toggle
        function toggleSubmenu(event, element) {
            event.preventDefault();
            const parentLi = element.parentElement;
            const isOpen = parentLi.classList.contains('open');
            document.querySelectorAll('.nav-item.has-submenu.open').forEach(li => {
                if (li !== parentLi) {
                    li.classList.remove('open');
                    li.querySelector('.nav-link').setAttribute('aria-expanded', 'false');
                }
            });
            parentLi.classList.toggle('open');
            element.setAttribute('aria-expanded', !isOpen);
        }


        // Modal Show/Hide

        // Show Edit Modal
        function showEditModal(id, brandName, country, models) {
            document.getElementById('editId').value = id;
            document.getElementById('editBrandName').value = brandName;
            document.getElementById('editCountry').value = country;
            document.getElementById('editModels').value = models;
            showModal('editBrandModal');
        }

        // Delete Brand
        function deleteBrand(id) {
            if (confirm('Are you sure you want to delete this brand?')) {
                brands = brands.filter(brand => brand.id !== id);
                updateTable();
                console.log(`Brand ${id} deleted`);
            }
        }

        // Handle Add Brand
        function handleAddBrand(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.textContent;
            button.textContent = 'Saving...';
            button.disabled = true;

            const newBrand = {
                id: brands.length ? Math.max(...brands.map(b => b.id)) + 1 : 1,
                brandName: form.querySelector('#addBrandName').value,
                country: form.querySelector('#addCountry').value,
                models: form.querySelector('#addModels').value
            };

            setTimeout(() => {
                brands.push(newBrand);
                updateTable();
                button.textContent = originalText;
                button.disabled = false;
                hideModal('addBrandModal');
                console.log('Brand added:', newBrand);
            }, 1000);
        }

        // Handle Edit Brand
        function handleEditBrand(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.textContent;
            button.textContent = 'Updating...';
            button.disabled = true;

            const updatedBrand = {
                id: parseInt(form.querySelector('#editId').value),
                brandName: form.querySelector('#editBrandName').value,
                country: form.querySelector('#editCountry').value,
                models: form.querySelector('#editModels').value
            };

            setTimeout(() => {
                brands = brands.map(brand => brand.id === updatedBrand.id ? updatedBrand : brand);
                updateTable();
                button.textContent = originalText;
                button.disabled = false;
                hideModal('editBrandModal');
                console.log('Brand updated:', updatedBrand);
            }, 1000);
        }

        // Update Table
        function updateTable() {
            const tbody = document.getElementById('brandsTable');
            tbody.innerHTML = '';
            brands.forEach(brand => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${brand.id}</td>
                    <td>${brand.brandName}</td>
                    <td>${brand.country}</td>
                    <td>${brand.models}</td>
                    <td>
                        <button onclick="showEditModal(${brand.id}, '${brand.brandName}', '${brand.country}', '${brand.models}')" aria-label="Edit Brand"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteBrand(${brand.id})" aria-label="Delete Brand"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            document.querySelector('div[role="main"] > div > div > div > div').textContent = `Total Brands: ${brands.length}`;
        }

        // Table Search
        function initializeSearch() {
            const searchInput = document.querySelector('#searchInput');
            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.toLowerCase();
                const rows = document.querySelectorAll('#brandsTable tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            });
        }

        // Pagination
        function changePage(page) {
            const buttons = document.querySelectorAll('div[role="navigation"] button');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (page === 'prev' && currentPage > 1) {
                currentPage--;
            } else if (page === 'next' && currentPage < 10) {
                currentPage++;
            } else if (typeof page === 'number') {
                currentPage = page;
            }

            const activeButton = Array.from(buttons).find(btn => btn.textContent == currentPage);
            if (activeButton) activeButton.classList.add('active');

            console.log(`Page changed to ${currentPage}`);
        }

        // Keyboard Shortcuts
        function initializeKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    const searchInput = document.querySelector('#searchInput');
                    if (searchInput) searchInput.focus();
                }
                if (e.key === 'Escape') {
                    const sidebar = document.getElementById('sidebar');
                    const modals = document.querySelectorAll('div[style="display: block;"]');
                    if (sidebar.style.display === 'block') {
                        toggleSidebar();
                    }
                    modals.forEach(modal => hideModal(modal.id));
                }
            });
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            initializeSearch();
            initializeKeyboardShortcuts();
            updateTable();
            toggleSidebar();
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
