<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autopulse Dashboard - Promotion Management">
    <title>Autopulse - Promotion</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header role="banner">
        <div>
            <button onclick="toggleSidebar()" aria-label="Toggle Sidebar"><i class="fas fa-bars"></i></button>
            <a href="#" aria-label="Autopulse Dashboard"><i class="fas fa-car"></i> Autopulse</a>
            <nav aria-label="Breadcrumb">
                <a href="#">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Promotion</span>
            </nav>
        </div>
        <div>
            <button aria-label="Notifications"><i class="fas fa-bell"></i></button>
            <div aria-label="User Profile">
                <div>A</div>
                <div>
                    <div>Autopulse</div>
                    <div>Super Admin</div>
                </div>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- Dashboard Container -->
    <div>
        <!-- Sidebar -->
        <div id="sidebar-slot"></div>

        <!-- Main Content -->
        <main role="main">
            <div>
                <div>Promotion</div>
                <div>
                    <div>A</div>
                    <div>
                        <div>Autopulse</div>
                        <div>Super Admin</div>
                    </div>
                </div>
            </div>

            <h1>Promotional Campaigns</h1>

            <div>
                <!-- Promotions Card -->
                <div>
                    <div>
                        <h2>Promotions</h2>
                        <div>
                            <div>Total Promotions: <span id="totalPromotions">3</span></div>
                            <button onclick="showModal('addPromotionModal')" aria-label="Add New Promotion">Add Promotion</button>
                        </div>
                    </div>
                    <div>
                        <div>
                            <div>
                                <input type="text" id="searchInput" placeholder="Search by Promotion Name or Status..." aria-label="Search Promotions">
                            </div>
                        </div>
                        <div>
                            <table aria-label="Promotions Table">
                                <thead>
                                    <tr>
                                        <th data-sort="id">No</th>
                                        <th data-sort="name">Promotion Name</th>
                                        <th data-sort="discount">Discount</th>
                                        <th data-sort="startDate">Start Date</th>
                                        <th data-sort="endDate">End Date</th>
                                        <th data-sort="status">Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="promotionTable"></tbody>
                            </table>
                        </div>
                        <div role="navigation" aria-label="Pagination">
                            <button onclick="changePage('prev')" aria-label="Previous Page">Prev</button>
                            <span id="paginationButtons"></span>
                            <button onclick="changePage('next')" aria-label="Next Page">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Promotion Modal -->
    <div id="addPromotionModal" role="dialog" aria-labelledby="addPromotionTitle">
        <div>
            <div>
                <h2 id="addPromotionTitle">Add Promotion</h2>
                <button onclick="hideModal('addPromotionModal')" aria-label="Close Modal">×</button>
            </div>
            <div>
                <div>
                    <label for="addName">Promotion Name</label>
                    <input type="text" id="addName" placeholder="Enter promotion name" required>
                </div>
                <div>
                    <label for="addDiscount">Discount (%)</label>
                    <input type="number" id="addDiscount" placeholder="Enter discount percentage" min="0" max="100" required>
                </div>
                <div>
                    <label for="addStartDate">Start Date</label>
                    <input type="date" id="addStartDate" required>
                </div>
                <div>
                    <label for="addEndDate">End Date</label>
                    <input type="date" id="addEndDate" required>
                </div>
                <div>
                    <label for="addStatus">Status</label>
                    <select id="addStatus" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <div>
                <button onclick="hideModal('addPromotionModal')" aria-label="Cancel">Cancel</button>
                <button onclick="addPromotion()" aria-label="Save Promotion">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit Promotion Modal -->
    <div id="editPromotionModal" role="dialog" aria-labelledby="editPromotionTitle">
        <div>
            <div>
                <h2 id="editPromotionTitle">Edit Promotion</h2>
                <button onclick="hideModal('editPromotionModal')" aria-label="Close Modal">×</button>
            </div>
            <div>
                <div>
                    <label for="editName">Promotion Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div>
                    <label for="editDiscount">Discount (%)</label>
                    <input type="number" id="editDiscount" min="0" max="100" required>
                </div>
                <div>
                    <label for="editStartDate">Start Date</label>
                    <input type="date" id="editStartDate" required>
                </div>
                <div>
                    <label for="editEndDate">End Date</label>
                    <input type="date" id="editEndDate" required>
                </div>
                <div>
                    <label for="editStatus">Status</label>
                    <select id="editStatus" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <div>
                <button onclick="hideModal('editPromotionModal')" aria-label="Cancel">Cancel</button>
                <button onclick="updatePromotion()" aria-label="Update Promotion">Update</button>
            </div>
        </div>
    </div>

    <script>
        // Sample promotion data
        const promotions = [
            { id: 1, name: 'Oil Change Discount', discount: 20, startDate: '2025-05-01', endDate: '2025-05-31', status: 'Active' },
            { id: 2, name: 'Tire Replacement Promo', discount: 15, startDate: '2025-04-15', endDate: '2025-05-15', status: 'Expired' },
            { id: 3, name: 'Full Service Package', discount: 25, startDate: '2025-05-10', endDate: '2025-06-10', status: 'Active' },
        ];

        let currentPage = 1;
        const itemsPerPage = 5;
        let sortColumn = 'id';
        let sortDirection = 'asc';
        let searchDebounceTimer;

        // Sidebar Toggle
        function toggleSubmenu(event, element) {
            event.preventDefault();
            const parentLi = element.parentElement;
            const isOpen = parentLi.classList.contains('open');
            document.querySelectorAll('.nav-item.has-submenu.open').forEach(li => {
                if (li !== parentLi) {
                    li.classList.remove('open');
                    li.querySelector('.nav-link').setAttribute('aria-expanded', 'false');
                }
            });
            parentLi.classList.toggle('open');
            element.setAttribute('aria-expanded', !isOpen);
        }


        // Modal Control

        function resetModal(modalId) {
            const modal = document.getElementById(modalId);
            const inputs = modal.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.value = '';
            });
        }

        // Add Promotion
        function addPromotion() {
            const name = document.getElementById('addName').value.trim();
            const discount = parseInt(document.getElementById('addDiscount').value);
            const startDate = document.getElementById('addStartDate').value;
            const endDate = document.getElementById('addEndDate').value;
            const status = document.getElementById('addStatus').value;

            if (!validateForm('add', { name, discount, startDate, endDate, status })) return;

            const newPromotion = {
                id: promotions.length ? Math.max(...promotions.map(p => p.id)) + 1 : 1,
                name,
                discount,
                startDate,
                endDate,
                status
            };

            promotions.push(newPromotion);
            updateTable();
            updateTotalPromotions();
            hideModal('addPromotionModal');
            console.log('Promotion added:', newPromotion);
        }

        // Show Edit Modal
        function showEditModal(id) {
            const promotion = promotions.find(p => p.id === id);
            if (!promotion) return;

            document.getElementById('editName').value = promotion.name;
            document.getElementById('editDiscount').value = promotion.discount;
            document.getElementById('editStartDate').value = promotion.startDate;
            document.getElementById('editEndDate').value = promotion.endDate;
            document.getElementById('editStatus').value = promotion.status;
            document.getElementById('editPromotionModal').dataset.id = id;
            showModal('editPromotionModal');
        }

        // Update Promotion
        function updatePromotion() {
            const id = parseInt(document.getElementById('editPromotionModal').dataset.id);
            const name = document.getElementById('editName').value.trim();
            const discount = parseInt(document.getElementById('editDiscount').value);
            const startDate = document.getElementById('editStartDate').value;
            const endDate = document.getElementById('editEndDate').value;
            const status = document.getElementById('editStatus').value;

            if (!validateForm('edit', { name, discount, startDate, endDate, status })) return;

            const promotion = promotions.find(p => p.id === id);
            if (promotion) {
                promotion.name = name;
                promotion.discount = discount;
                promotion.startDate = startDate;
                promotion.endDate = endDate;
                promotion.status = status;
                updateTable();
                hideModal('editPromotionModal');
                console.log('Promotion updated:', promotion);
            }
        }

        // Delete Promotion
        function deletePromotion(id) {
            if (!confirm('Are you sure you want to delete this promotion?')) return;
            const index = promotions.findIndex(p => p.id === id);
            if (index !== -1) {
                promotions.splice(index, 1);
                updateTable();
                updateTotalPromotions();
                console.log('Promotion deleted:', id);
            }
        }

        // Form Validation
        function validateForm(modalType, { name, discount, startDate, endDate, status }) {
            let isValid = true;
            const prefix = modalType === 'add' ? 'add' : 'edit';
            const inputs = [
                { value: name, id: `${prefix}Name` },
                { value: discount, id: `${prefix}Discount` },
                { value: startDate, id: `${prefix}StartDate` },
                { value: endDate, id: `${prefix}EndDate` },
                { value: status, id: `${prefix}Status` }
            ];

            inputs.forEach(input => {
                const element = document.getElementById(input.id);
                if (!input.value || (input.id === `${prefix}Discount` && (isNaN(discount) || discount < 0 || discount > 100))) {
                    element.style.border = '2px solid red';
                    isValid = false;
                } else {
                    element.style.border = '';
                }
            });

            if (new Date(startDate) > new Date(endDate)) {
                document.getElementById(`${prefix}EndDate`).style.border = '2px solid red';
                isValid = false;
            }

            return isValid;
        }

        // Table Search with Debounce
        function initializeSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', () => {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    currentPage = 1;
                    updateTable();
                }, 300);
            });
        }

        // Table Sorting
        function initializeSorting() {
            const headers = document.querySelectorAll('th[data-sort]');
            headers.forEach(header => {
                header.addEventListener('click', () => {
                    const column = header.dataset.sort;
                    if (sortColumn === column) {
                        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortColumn = column;
                        sortDirection = 'asc';
                    }
                    updateTable();
                });
            });
        }

        // Update Total Promotions
        function updateTotalPromotions() {
            const totalPromotions = document.getElementById('totalPromotions');
            totalPromotions.textContent = promotions.length;
        }

        // Update Table with Pagination
        function updateTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('promotionTable');
            tbody.innerHTML = '';

            let filteredPromotions = promotions.filter(p =>
                p.name.toLowerCase().includes(searchTerm) ||
                p.status.toLowerCase().includes(searchTerm)
            );

            filteredPromotions.sort((a, b) => {
                let valA = a[sortColumn];
                let valB = b[sortColumn];
                if (sortColumn === 'discount') {
                    valA = parseInt(valA);
                    valB = parseInt(valB);
                } else if (sortColumn.includes('Date')) {
                    valA = new Date(valA);
                    valB = new Date(valB);
                }
                return sortDirection === 'asc' ? (valA < valB ? -1 : 1) : (valA > valB ? -1 : 1);
            });

            const totalPages = Math.ceil(filteredPromotions.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedPromotions = filteredPromotions.slice(startIndex, endIndex);

            const pillClass = { Active: 'success', Expired: 'danger', Scheduled: 'info', Draft: 'info', Inactive: 'danger' };
            paginatedPromotions.forEach((promotion, index) => {
                const row = document.createElement('tr');
                const cls = pillClass[promotion.status] || 'neutral';
                row.innerHTML = `
                    <td>${startIndex + index + 1}</td>
                    <td><strong>${promotion.name}</strong></td>
                    <td class="num">${promotion.discount}%</td>
                    <td>${promotion.startDate}</td>
                    <td>${promotion.endDate}</td>
                    <td><span class="pill ${cls}">${promotion.status}</span></td>
                    <td style="text-align: right;">
                        <button onclick="showEditModal(${promotion.id})" aria-label="Edit Promotion"><i class="fas fa-edit"></i></button>
                        <button onclick="deletePromotion(${promotion.id})" aria-label="Delete Promotion"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            updatePagination(totalPages);
        }

        // Update Pagination
        function updatePagination(totalPages) {
            const pagination = document.getElementById('paginationButtons');
            pagination.innerHTML = '';

            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.onclick = () => changePage(i);
                if (i === currentPage) button.style.fontWeight = 'bold';
                pagination.appendChild(button);
            }

            const prevButton = document.querySelector('button[aria-label="Previous Page"]');
            const nextButton = document.querySelector('button[aria-label="Next Page"]');
            prevButton.disabled = currentPage === 1;
            nextButton.disabled = currentPage === totalPages;
        }

        // Change Page
        function changePage(page) {
            const totalPages = Math.ceil(promotions.filter(p =>
                p.name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase()) ||
                p.status.toLowerCase().includes(p.status.toLowerCase())
            ).length / itemsPerPage);

            if (page === 'prev' && currentPage > 1) {
                currentPage--;
            } else if (page === 'next' && currentPage < totalPages) {
                currentPage++;
            } else if (typeof page === 'number' && page >= 1 && page <= totalPages) {
                currentPage = page;
            }

            updateTable();
        }

        // Keyboard Shortcuts
        function initializeKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                    e.preventDefault();
                    showModal('addPromotionModal');
                }
                if (e.key === 'Escape') {
                    const modals = document.querySelectorAll('.modal');
                    modals.forEach(modal => {
                        if (modal.style.display === 'block') hideModal(modal.id);
                    });
                    if (document.getElementById('sidebar').style.display !== 'none') {
                        toggleSidebar();
                    }
                }
                if (e.key === 'Enter' && document.querySelector('.modal[style*="block"]')) {
                    const modalId = document.querySelector('.modal[style*="block"]').id;
                    if (modalId === 'addPromotionModal') {
                        addPromotion();
                    } else if (modalId === 'editPromotionModal') {
                        updatePromotion();
                    }
                }
            });
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            // removed: forced sidebar-hidden on load
            initializeSearch();
            initializeSorting();
            initializeKeyboardShortcuts();
            updateTable();
            updateTotalPromotions();
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
