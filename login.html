<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autopulse Admin Login - Secure access to manage your workshop dashboard">
    <title>Autopulse - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette (Aligned with Dashboard) */
            --primary-gradient: linear-gradient(135deg, #facc15 0%, #eab308 100%);
            --accent-gradient: linear-gradient(135deg, #fde047 0%, #eab308 100%);
            --gold-gradient: linear-gradient(135deg, #facc15 0%, #eab308 100%);
            --success-gradient: linear-gradient(135deg, #16A34A 0%, #22C55E 100%);
            --bg-primary: #fefce8;
            --bg-secondary: #ffffff;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border-color: #fde047;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 25px rgba(0,0,0,0.12);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.15);
            
            /* Layout */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            /* Transitions */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-base: 14px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            --font-size-2xl: 20px;
            --font-size-3xl: 24px;
            --font-size-4xl: 28px;
            
            /* Spacing */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
        }

        /* Reset & Base Styles */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 14px;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            line-height: 1.6;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
            overflow-x: hidden;
        }

        /* Login Container */
        .login-container {
            display: flex;
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            min-height: 500px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease forwards;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(0,0,0,0.05)"/><circle cx="75" cy="75" r="1" fill="rgba(0,0,0,0.05)"/><circle cx="50" cy="10" r="0.5" fill="rgba(0,0,0,0.03)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
            z-index: 0;
        }

        /* Left Panel */
        .left-panel {
            flex: 1;
            background: var(--primary-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 6s infinite;
            z-index: 0;
        }

        @keyframes shine {
            0% { transform: rotate(-45deg) translateX(-100%); }
            100% { transform: rotate(-45deg) translateX(100%); }
        }

        .logo-container {
            text-align: center;
            z-index: 1;
            animation: slideIn 0.8s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: var(--spacing-lg);
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .company-name {
            font-size: var(--font-size-4xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .tagline {
            font-size: var(--font-size-sm);
            opacity: 0.8;
            text-align: center;
            line-height: 1.6;
            max-width: 250px;
        }

        /* Right Panel */
        .right-panel {
            flex: 1;
            padding: var(--spacing-2xl);
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--bg-secondary);
            position: relative;
            z-index: 1;
        }

        .login-header {
            margin-bottom: var(--spacing-xl);
            animation: slideIn 0.8s ease forwards 0.2s;
            opacity: 0;
        }

        .login-title {
            font-size: var(--font-size-3xl);
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
            font-weight: 600;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            font-weight: 400;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: var(--spacing-lg);
            position: relative;
            animation: slideIn 0.8s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
            font-weight: 500;
            font-size: var(--font-size-sm);
            transition: var(--transition);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-lg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gradient);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
            transform: scale(1.02);
        }

        .form-input:invalid:not(:placeholder-shown) {
            border-color: #DC2626;
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            font-size: var(--font-size-sm);
            animation: slideIn 0.8s ease forwards 0.5s;
            opacity: 0;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .checkbox-container input[type="checkbox"] {
            width: auto;
            accent-color: var(--accent-gradient);
            cursor: pointer;
            transform: scale(1.2);
            transition: var(--transition);
        }

        .checkbox-container label {
            cursor: pointer;
            color: var(--text-primary);
        }

        .forgot-password {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: translateY(-1px);
        }

        /* Login Button */
        .login-button {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-size: var(--font-size-lg);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.8s ease forwards 0.6s;
            opacity: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: var(--transition);
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .login-button .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: var(--spacing-xs);
        }

        .login-button.loading .spinner {
            display: inline-block;
        }

        .login-button.loading span {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                max-width: 400px;
                min-height: auto;
            }

            .left-panel, .right-panel {
                padding: var(--spacing-lg);
            }

            .company-name {
                font-size: var(--font-size-3xl);
            }

            .logo {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }

            .tagline {
                font-size: var(--font-size-xs);
            }

            .login-title {
                font-size: var(--font-size-2xl);
            }

            .login-button {
                font-size: var(--font-size-sm);
                padding: var(--spacing-sm) var(--spacing-md);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                max-width: 95%;
                border-radius: var(--radius-lg);
            }

            .left-panel {
                padding: var(--spacing-md);
            }

            .right-panel {
                padding: var(--spacing-md);
            }

            .company-name {
                font-size: var(--font-size-2xl);
            }

            .login-title {
                font-size: var(--font-size-xl);
            }

            .form-input {
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: var(--font-size-xs);
            }

            .form-options {
                flex-direction: column;
                gap: var(--spacing-sm);
                align-items: flex-start;
            }
        }
        </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container" role="main">
        <div class="left-panel">
            <div class="logo-container">
                <div class="logo" aria-label="Autopulse Logo">
                    <i class="fas fa-car"></i>
                </div>
                <div class="company-name">AUTOPULSE</div>
                <div class="tagline">Pengelolaan Lancar Dimulai dari Sini</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-header">
                <h2 class="login-title">Hi, Admin Workshop</h2>
                <p class="login-subtitle">Silakan masukkan username dan password</p>
            </div>

            <form id="loginForm" aria-label="Login Form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required placeholder="Masukkan username" aria-required="true">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="Masukkan password" aria-required="true">
                </div>

                <div class="form-options">
                    <div class="checkbox-container">
                        <input type="checkbox" id="remember" name="remember" aria-label="Ingat saya">
                        <label for="remember">Ingat saya</label>
                    </div>
                    <a href="#" class="forgot-password" aria-label="Lupa Password">Lupa Password?</a>
                </div>

                <button type="submit" class="login-button" aria-label="Login">
                    <span class="spinner"></span>
                    <span>Login</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.querySelector('.login-button');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username && password) {
                loginButton.classList.add('loading');
                
                // Simulate login and store session
                setTimeout(() => {
                    localStorage.setItem('isLoggedIn', 'true');
                    loginButton.classList.remove('loading');
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                alert('Silakan isi username dan password');
            }
        });

        // Ripple Effect for Button
        loginButton.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // Keyboard Accessibility
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // Focus Management
        document.getElementById('username').focus();
    </script>
    <script src="app.js"></script>
</body>
</html>
