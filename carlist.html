<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autopulse Dashboard - Car List Management">
    <title>Autopulse - Car List</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header role="banner">
        <div>
            <button onclick="toggleSidebar()" aria-label="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" aria-label="Autopulse Dashboard">
                <i class="fas fa-car"></i> Autopulse
            </a>
            <nav aria-label="Breadcrumb">
                <a href="#">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Car List</span>
            </nav>
        </div>
        <div>
            <button aria-label="Notifications">
                <i class="fas fa-bell"></i>
            </button>
            <div aria-label="User Profile">
                <div>A</div>
                <div>
                    <div>Autopulse</div>
                    <div>Super Admin</div>
                </div>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- Dashboard Container -->
    <div>
        <!-- Sidebar -->
        <div id="sidebar-slot"></div>

        <!-- Main Content -->
        <main role="main">
            <div>
                <div>
                    <i class="fas fa-list"></i> Car List
                </div>
                <button onclick="showModal('addCarModal')" aria-label="Add New Car">
                    <i class="fas fa-plus"></i> Add Car
                </button>
            </div>

            <h1>Car List</h1>

            <div>
                <div>
                    <h2>Registered Cars</h2>
                    <div>
                        <div>
                            <input type="text" id="searchInput" placeholder="Search by VIN, License, Brand, Model, or Owner..." aria-label="Search Cars">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                </div>
                <div>
                    <div id="totalCars">Total Cars: 3</div>
                    <div>
                        <table aria-label="Cars Table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Brand</th>
                                    <th>Model</th>
                                    <th>License Number</th>
                                    <th>VIN</th>
                                    <th>Owner</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="carsTable">
                                <tr>
                                    <td>1</td>
                                    <td>Toyota</td>
                                    <td>Rush</td>
                                    <td>BA 1234 OOD</td>
                                    <td>123456789</td>
                                    <td>Anne</td>
                                    <td>
                                        <button onclick="showEditModal(1, 'Toyota', 'Rush', 'BA 1234 OOD', '123456789', 'Anne')" aria-label="Edit Car"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteCar(1)" aria-label="Delete Car"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Honda</td>
                                    <td>Civic</td>
                                    <td>BA 5678 ABC</td>
                                    <td>987654321</td>
                                    <td>Budi</td>
                                    <td>
                                        <button onclick="showEditModal(2, 'Honda', 'Civic', 'BA 5678 ABC', '987654321', 'Budi')" aria-label="Edit Car"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteCar(2)" aria-label="Delete Car"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>Chery</td>
                                    <td>Tiggo</td>
                                    <td>BA 9012 XYZ</td>
                                    <td>456789123</td>
                                    <td>Citra</td>
                                    <td>
                                        <button onclick="showEditModal(3, 'Chery', 'Tiggo', 'BA 9012 XYZ', '456789123', 'Citra')" aria-label="Edit Car"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteCar(3)" aria-label="Delete Car"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div role="navigation" aria-label="Pagination">
                        <button onclick="changePage('prev')" aria-label="Previous Page"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="changePage(1)">1</button>
                        <button onclick="changePage(2)">2</button>
                        <button onclick="changePage(3)">3</button>
                        <button onclick="changePage(4)">4</button>
                        <span>...</span>
                        <button onclick="changePage(10)">10</button>
                        <button onclick="changePage('next')" aria-label="Next Page"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Car Modal -->
    <div id="addCarModal" role="dialog" aria-labelledby="addModalTitle">
        <div>
            <div>
                <h2 id="addModalTitle">Add New Car</h2>
                <button onclick="hideModal('addCarModal')" aria-label="Close Modal">×</button>
            </div>
            <form id="addCarForm" onsubmit="handleAddCar(event)">
                <div>
                    <div>
                        <label for="addBrand">Brand</label>
                        <input type="text" id="addBrand" placeholder="Enter brand" required pattern="[A-Za-z\s]{2,50}">
                    </div>
                    <div>
                        <label for="addModel">Model</label>
                        <input type="text" id="addModel" placeholder="Enter model" required pattern="[A-Za-z0-9\s]{2,50}">
                    </div>
                    <div>
                        <label for="addLicense">License Number</label>
                        <input type="text" id="addLicense" placeholder="Enter license number" required pattern="[A-Z0-9\s]{5,12}">
                    </div>
                    <div>
                        <label for="addVIN">VIN</label>
                        <input type="text" id="addVIN" placeholder="Enter VIN" required pattern="[A-HJ-NPR-Z0-9]{9}">
                    </div>
                    <div>
                        <label for="addOwner">Owner</label>
                        <input type="text" id="addOwner" placeholder="Enter owner name" required pattern="[A-Za-z\s]{2,50}">
                    </div>
                </div>
                <div>
                    <button type="button" onclick="hideModal('addCarModal')" aria-label="Cancel">Cancel</button>
                    <button type="submit" aria-label="Save Car">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Car Modal -->
    <div id="editCarModal" role="dialog" aria-labelledby="editModalTitle">
        <div>
            <div>
                <h2 id="editModalTitle">Edit Car</h2>
                <button onclick="hideModal('editCarModal')" aria-label="Close Modal">×</button>
            </div>
            <form id="editCarForm" onsubmit="handleEditCar(event)">
                <div>
                    <input type="hidden" id="editId">
                    <div>
                        <label for="editBrand">Brand</label>
                        <input type="text" id="editBrand" required pattern="[A-Za-z\s]{2,50}">
                    </div>
                    <div>
                        <label for="editModel">Model</label>
                        <input type="text" id="editModel" required pattern="[A-Za-z0-9\s]{2,50}">
                    </div>
                    <div>
                        <label for="editLicense">License Number</label>
                        <input type="text" id="editLicense" required pattern="[A-Z0-9\s]{5,12}">
                    </div>
                    <div>
                        <label for="editVIN">VIN</label>
                        <input type="text" id="editVIN" required pattern="[A-HJ-NPR-Z0-9]{9}">
                    </div>
                    <div>
                        <label for="editOwner">Owner</label>
                        <input type="text" id="editOwner" required pattern="[A-Za-z\s]{2,50}">
                    </div>
                </div>
                <div>
                    <button type="button" onclick="hideModal('editCarModal')" aria-label="Cancel">Cancel</button>
                    <button type="submit" aria-label="Update Car">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let cars = [
            { id: 1, brand: 'Toyota', model: 'Rush', license: 'BA 1234 OOD', vin: '123456789', owner: 'Anne' },
            { id: 2, brand: 'Honda', model: 'Civic', license: 'BA 5678 ABC', vin: '987654321', owner: 'Budi' },
            { id: 3, brand: 'Chery', model: 'Tiggo', license: 'BA 9012 XYZ', vin: '456789123', owner: 'Citra' }
        ];

        // Sidebar Toggle
        function toggleSubmenu(event, element) {
            event.preventDefault();
            const parentLi = element.parentElement;
            const isOpen = parentLi.classList.contains('open');
            document.querySelectorAll('.nav-item.has-submenu.open').forEach(li => {
                if (li !== parentLi) {
                    li.classList.remove('open');
                    li.querySelector('.nav-link').setAttribute('aria-expanded', 'false');
                }
            });
            parentLi.classList.toggle('open');
            element.setAttribute('aria-expanded', !isOpen);
        }


        // Modal Show/Hide

        // Show Edit Modal
        function showEditModal(id, brand, model, license, vin, owner) {
            document.getElementById('editId').value = id;
            document.getElementById('editBrand').value = brand;
            document.getElementById('editModel').value = model;
            document.getElementById('editLicense').value = license;
            document.getElementById('editVIN').value = vin;
            document.getElementById('editOwner').value = owner;
            showModal('editCarModal');
        }

        // Delete Car
        function deleteCar(id) {
            if (confirm('Are you sure you want to delete this car?')) {
                cars = cars.filter(car => car.id !== id);
                updateTable();
                console.log(`Car ${id} deleted`);
            }
        }

        // Handle Add Car
        function handleAddCar(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.textContent;
            button.textContent = 'Saving...';
            button.disabled = true;

            const newCar = {
                id: cars.length ? Math.max(...cars.map(c => c.id)) + 1 : 1,
                brand: form.querySelector('#addBrand').value,
                model: form.querySelector('#addModel').value,
                license: form.querySelector('#addLicense').value,
                vin: form.querySelector('#addVIN').value,
                owner: form.querySelector('#addOwner').value
            };

            setTimeout(() => {
                cars.push(newCar);
                updateTable();
                button.textContent = originalText;
                button.disabled = false;
                hideModal('addCarModal');
                console.log('Car added:', newCar);
            }, 1000);
        }

        // Handle Edit Car
        function handleEditCar(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.textContent;
            button.textContent = 'Updating...';
            button.disabled = true;

            const updatedCar = {
                id: parseInt(form.querySelector('#editId').value),
                brand: form.querySelector('#editBrand').value,
                model: form.querySelector('#editModel').value,
                license: form.querySelector('#editLicense').value,
                vin: form.querySelector('#editVIN').value,
                owner: form.querySelector('#editOwner').value
            };

            setTimeout(() => {
                cars = cars.map(car => car.id === updatedCar.id ? updatedCar : car);
                updateTable();
                button.textContent = originalText;
                button.disabled = false;
                hideModal('editCarModal');
                console.log('Car updated:', updatedCar);
            }, 1000);
        }

        // Update Table
        function updateTable() {
            const tbody = document.getElementById('carsTable');
            const totalCarsDiv = document.getElementById('totalCars');
            tbody.innerHTML = '';
            cars.forEach(car => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${car.id}</td>
                    <td>${car.brand}</td>
                    <td>${car.model}</td>
                    <td>${car.license}</td>
                    <td>${car.vin}</td>
                    <td>${car.owner}</td>
                    <td>
                        <button onclick="showEditModal(${car.id}, '${car.brand}', '${car.model}', '${car.license}', '${car.vin}', '${car.owner}')" aria-label="Edit Car"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCar(${car.id})" aria-label="Delete Car"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            totalCarsDiv.textContent = `Total Cars: ${cars.length}`;
        }

        // Table Search
        function initializeSearch() {
            const searchInput = document.querySelector('#searchInput');
            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.toLowerCase();
                const rows = document.querySelectorAll('#carsTable tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            });
        }

        // Pagination
        function changePage(page) {
            const buttons = document.querySelectorAll('div[role="navigation"] button');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (page === 'prev' && currentPage > 1) {
                currentPage--;
            } else if (page === 'next' && currentPage < 10) {
                currentPage++;
            } else if (typeof page === 'number') {
                currentPage = page;
            }

            const activeButton = Array.from(buttons).find(btn => btn.textContent == currentPage);
            if (activeButton) activeButton.classList.add('active');

            console.log(`Page changed to ${currentPage}`);
            // Implement backend data fetch here
        }

        // Keyboard Shortcuts
        function initializeKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    const searchInput = document.querySelector('#searchInput');
                    if (searchInput) searchInput.focus();
                }
                if (e.key === 'Escape') {
                    const sidebar = document.getElementById('sidebar');
                    const modals = document.querySelectorAll('[role="dialog"][style="display: block;"]');
                    if (sidebar.style.display === 'block') {
                        toggleSidebar();
                    }
                    modals.forEach(modal => hideModal(modal.id));
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    showModal('addCarModal');
                }
            });
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            initializeSearch();
            initializeKeyboardShortcuts();
            // removed: forced sidebar-hidden on load (was hiding sidebar on desktop too)
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
