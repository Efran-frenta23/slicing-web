<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autopulse Member Management Dashboard - Manage members, memberships, and customer data efficiently">
    <title>Autopulse - Member Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header" role="banner">
        <div class="header-left">
            <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" class="logo" aria-label="Autopulse Dashboard">
                <i class="fas fa-car"></i> Autopulse
            </a>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="#">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Dashboard</span>
            </nav>
        </div>
        <div class="header-right">
            <button class="notification-icon" aria-label="Notifications">
                <i class="fas fa-bell"></i>
            </button>
            <div class="user-info" aria-label="User Profile">
                <div class="user-avatar">JD</div>
                <div>
                    <div style="font-size: var(--font-size-sm); font-weight: 600;">John Doe</div>
                    <div style="font-size: var(--font-size-xs); opacity: 0.8;">Super Admin</div>
                </div>
                <i class="fas fa-chevron-down" style="font-size: 10px; opacity: 0.8;"></i>
            </div>
        </div>
    </header>

    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div id="sidebar-slot"></div>

        <!-- Main Content -->
        <main class="main-content" role="main">
            <div class="content-header">
                <div class="page-title">
                    <i class="fas fa-tachometer-alt"></i> Member Dashboard
                </div>
                <button class="btn btn-primary add-member-btn" aria-label="Add New Member">
                    <i class="fas fa-plus"></i> Add Member
                </button>
            </div>

            <h1 class="section-header">Member Management</h1>

            <div class="content-card">
                <div class="card-header">
                    <h2>Members List</h2>
                    <div class="search-container">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search members..." aria-label="Search Members">
                            <i class="fas fa-search"></i>
                        </div>
                        <button class="btn btn-primary" aria-label="Filter Members">
                            <i class="fas fa-filter"></i> Filter
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table" aria-label="Members Table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Membership</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="membersTable">
                                <tr>
                                    <td>1</td>
                                    <td>John Doe</td>
                                    <td>john.doe@example.com</td>
                                    <td>Premium</td>
                                    <td><span class="pill success">Active</span></td>
                                    <td>
                                        <button class="action-btn" aria-label="Edit Member">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="action-btn danger" aria-label="Delete Member">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Jane Smith</td>
                                    <td>jane.smith@example.com</td>
                                    <td>Standard</td>
                                    <td><span class="pill danger">Inactive</span></td>
                                    <td>
                                        <button class="action-btn" aria-label="Edit Member">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="action-btn danger" aria-label="Delete Member">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" role="navigation" aria-label="Pagination">
                        <button aria-label="Previous Page"><i class="fas fa-chevron-left"></i></button>
                        <button class="active" aria-current="page">1</button>
                        <button>2</button>
                        <button>3</button>
                        <button aria-label="Next Page"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="addMemberModal" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Member</h2>
                <button class="close-btn" aria-label="Close Modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="memberForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" class="form-input" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="membership" class="form-label">Membership Type</label>
                        <select id="membership" class="form-input" required aria-required="true">
                            <option value="premium">Premium</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-btn" aria-label="Cancel">Cancel</button>
                <button class="btn btn-primary" id="saveMember" aria-label="Save Member">Save</button>
            </div>
        </div>
    </div>

    <script>

        function toggleMobileMenu() {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('show');
            if (navMenu.classList.contains('show')) {
                navMenu.style.animation = 'slideDown 0.3s ease';
            } else {
                navMenu.style.animation = 'slideUp 0.3s ease';
            }
        }

        // Modal Handling
        const addMemberBtn = document.querySelector('.add-member-btn');
        const modal = document.querySelector('#addMemberModal');
        const closeButtons = document.querySelectorAll('.close-btn');

        addMemberBtn.addEventListener('click', () => {
            modal.classList.add('show');
        });

        closeButtons.forEach(button => {
            button.addEventListener('click', () => {
                modal.classList.remove('show');
            });
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });

        // Table Search
        const searchInput = document.querySelector('#searchInput');
        const tableRows = document.querySelectorAll('#membersTable tr');

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            tableRows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });

        // Form Submission
        const memberForm = document.querySelector('#memberForm');
        const saveMemberBtn = document.querySelector('#saveMember');

        saveMemberBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (memberForm.checkValidity()) {
                alert('Member saved successfully!');
                modal.classList.remove('show');
                memberForm.reset();
            } else {
                memberForm.reportValidity();
            }
        });

        // Enhanced Interactivity
        document.addEventListener('DOMContentLoaded', () => {

            // Ripple Effect for Buttons
            const buttons = document.querySelectorAll('.btn, .action-btn');
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.classList.add('ripple');
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                });
            });

            // Card Hover Effects
            const cards = document.querySelectorAll('.content-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-4px) scale(1.01)';
                });
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0) scale(1)';
                });
            });

            // Smooth Scroll for Nav Links
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => this.style.transform = 'scale(1)', 150);
                });
            });
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                const navMenu = document.getElementById('navMenu');
                if (!sidebar.classList.contains('collapsed')) {
                    toggleSidebar();
                }
                if (navMenu.classList.contains('show')) {
                    toggleMobileMenu();
                }
                modal.classList.remove('show');
            }
        });

        // CSS Animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            
            @keyframes slideUp {
                from { opacity: 1; transform: translateY(0); }
                to { opacity: 0; transform: translateY(-10px); }
            }
            
            .ripple {
                position: absolute;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.6);
                transform: scale(0);
                animation: rippleEffect 0.6s linear;
                pointer-events: none;
            }
            
            @keyframes rippleEffect {
                to { transform: scale(4); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    
        function toggleSubmenu(event, element) {
            event.preventDefault();
            const parentLi = element.parentElement;
            const isOpen = parentLi.classList.contains('open');
            document.querySelectorAll('.nav-item.has-submenu.open').forEach(li => {
                if (li !== parentLi) {
                    li.classList.remove('open');
                    const l = li.querySelector('.nav-link');
                    if (l) l.setAttribute('aria-expanded', 'false');
                }
            });
            parentLi.classList.toggle('open');
            element.setAttribute('aria-expanded', !isOpen);
        }

    </script>
    <script src="app.js"></script>
</body>
</html>
